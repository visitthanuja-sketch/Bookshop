name: Build and Deploy to Kyma

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install CDS CLI
        run: npm install -g @sap/cds-dk

      - name: Build CAP project
        run: cds build --production

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push bookshop-srv image
        run: |
          pack build ghcr.io/${{ github.repository_owner }}/bookshop-srv \
            --path gen/srv \
            --builder paketobuildpacks/builder-jammy-base \
            --publish

      - name: Build and push bookshop-hana-deployer image
        run: |
          pack build ghcr.io/${{ github.repository_owner }}/bookshop-hana-deployer \
            --path gen/db \
            --builder paketobuildpacks/builder-jammy-base \
            --publish

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Create ghcr.io pull secret in Kyma
        run: |
          kubectl delete secret registry-secret -n i566464 --ignore-not-found
          kubectl create secret docker-registry registry-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=i566464

      - name: Deploy to Kyma
        run: |
          helm dependency update gen/chart
          kubectl delete servicebinding bookshop-hana-deployer-hana bookshop-srv-db -n i566464 --ignore-not-found
          kubectl delete apirule bookshop-srv -n i566464 --ignore-not-found
          helm upgrade --install bookshop gen/chart \
            --namespace i566464 \
            --set global.image.registry=ghcr.io/${{ github.repository_owner }} \
            --set global.image.tag=${{ github.sha }} \
            --set "hana.serviceOfferingName=hana" \
            --set "hana.servicePlanName=hana" \
            --disable-openapi-validation
