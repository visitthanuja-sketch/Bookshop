name: Build and Deploy to Kyma

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install CDS CLI
        run: npm install -g @sap/cds-dk

      - name: Build CAP project
        run: cds build --production

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      - name: Build and push bookshop-srv image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login docker.io -u "$DOCKER_USERNAME" --password-stdin
          pack build docker.io/${{ secrets.DOCKER_USERNAME }}/bookshop-srv \
            --path gen/srv \
            --builder paketobuildpacks/builder-jammy-base \
            --publish

      - name: Build and push bookshop-hana-deployer image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          pack build docker.io/${{ secrets.DOCKER_USERNAME }}/bookshop-hana-deployer \
            --path gen/db \
            --builder paketobuildpacks/builder-jammy-base \
            --publish

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy to Kyma
        run: |
          helm dependency update gen/chart
          helm upgrade --install bookshop gen/chart \
            --namespace i566464 \
            --set global.image.tag=${{ github.sha }} \
            --set "hana.serviceOfferingName=hana" \
            --set "hana.servicePlanName=hana" \
            --disable-openapi-validation \
            --wait --timeout=10m
